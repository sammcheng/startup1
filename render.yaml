services:
  - type: web
    name: start
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/api
    buildFilter:
      paths:
        - apps/api/**
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: hackmarket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hackmarket-redis
          type: keyvalue
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: RENDER_TOOL_REGION
        value: oregon
      - key: RENDER_TOOL_PLAN
        value: free
      - key: RENDER_TOOL_AUTO_DEPLOY
        value: "false"
      - key: RENDER_TOOL_HEALTHCHECK_PATH
        value: /health
      - key: RENDER_TOOL_DEPLOY_TIMEOUT_SECONDS
        value: "900"
      - key: RENDER_REGISTRY_CREDENTIAL_ID
        sync: false
      - key: RENDER_REGISTRY_CREDENTIAL_NAME
        value: hackmarket-ghcr
      - key: IMAGE_REGISTRY_NAMESPACE
        sync: false
      - key: GHCR_USERNAME
        sync: false
      - key: GHCR_TOKEN
        sync: false

  - type: web
    name: home-accessibility-checker
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/seller-tools/home-accessibility-checker
    buildFilter:
      paths:
        - apps/seller-tools/home-accessibility-checker/**
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUBLIC_APP_URL
        value: https://hackmarket.io
      - key: LOG_LEVEL
        value: info
      - key: OPENROUTER_TIMEOUT_MS
        value: "20000"
      - key: ANALYSIS_TIMEOUT_MS
        value: "45000"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: MAX_FILES
        value: "5"
      - key: MAX_INLINE_IMAGES
        value: "5"
      - key: LISTING_FETCH_TIMEOUT_MS
        value: "10000"
      - key: REMOTE_IMAGE_FETCH_TIMEOUT_MS
        value: "10000"
      - key: MAX_REMOTE_IMAGE_BYTES
        value: "12582912"

  - type: keyvalue
    name: hackmarket-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction

databases:
  - name: hackmarket-db
    plan: basic_256mb
    region: oregon
    postgresMajorVersion: "16"
