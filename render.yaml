services:
  - type: web
    name: start
    runtime: docker
    plan: starter
    region: oregon
    rootDir: apps/api
    buildFilter:
      paths:
        - apps/api/**
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_BASE_URL
        value: https://web-six-dusky-20.vercel.app
      - key: PUBLIC_API_BASE_URL
        value: https://start-3lbd.onrender.com
      - key: CORS_ORIGINS
        value: '["https://web-six-dusky-20.vercel.app"]'
      - key: CORS_ORIGIN_REGEX
        value: ""
      - key: ALLOW_VERCEL_PREVIEW_ORIGINS
        value: "false"
      - key: MAX_SOURCE_ZIP_ENTRIES
        value: "500"
      - key: MAX_SOURCE_ZIP_UNCOMPRESSED_BYTES
        value: "104857600"
      - key: DATABASE_URL
        fromDatabase:
          name: hackmarket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hackmarket-redis
          type: keyvalue
          property: connectionString
      - key: WORKER_QUEUE_NAME
        value: hackmarket:jobs
      - key: WORKER_JOB_MAX_ATTEMPTS
        value: "3"
      - key: WORKER_JOB_TIMEOUT_SECONDS
        value: "900"
      - key: WORKER_JOB_KEEP_RESULT_SECONDS
        value: "86400"
      - key: WORKER_CONCURRENCY
        value: "4"
      - key: WORKER_HEALTH_CHECK_INTERVAL_SECONDS
        value: "60"
      - key: WORKER_HEALTH_CHECK_KEY
        value: hackmarket:jobs:health
      - key: RUN_BILLING_SCHEDULER_IN_API
        value: "false"
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_TIMEOUT_SECONDS
        value: "5"
      - key: ALERT_DEDUPE_TTL_SECONDS
        value: "900"
      - key: ALERT_QUEUE_DEPTH_THRESHOLD
        value: "100"
      - key: ALERT_PROCESSING_JOB_STALE_AFTER_SECONDS
        value: "1800"
      - key: ALERT_FAILED_PROCESSING_JOBS_THRESHOLD
        value: "3"
      - key: ALERT_FAILED_PROCESSING_JOBS_WINDOW_SECONDS
        value: "900"
      - key: CONVERTER_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4
      - key: OPENROUTER_APP_URL
        value: https://web-six-dusky-20.vercel.app
      - key: OPENROUTER_APP_NAME
        value: Hackmarket
      - key: ALLOW_REPO_ANALYSIS_FALLBACK
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: RENDER_TOOL_REGION
        value: oregon
      - key: RENDER_TOOL_PLAN
        value: starter
      - key: RENDER_TOOL_AUTO_DEPLOY
        value: "false"
      - key: RENDER_TOOL_HEALTHCHECK_PATH
        value: /health
      - key: RENDER_TOOL_DEPLOY_TIMEOUT_SECONDS
        value: "900"
      - key: PUBLIC_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: GATEWAY_RATE_LIMIT_VIOLATION_ALERT_THRESHOLD
        value: "3"
      - key: GATEWAY_RATE_LIMIT_VIOLATION_WINDOW_SECONDS
        value: "3600"
      - key: MAX_ACTIVE_API_KEYS_PER_USER
        value: "10"
      - key: RENDER_REGISTRY_CREDENTIAL_ID
        sync: false
      - key: RENDER_REGISTRY_CREDENTIAL_NAME
        value: hackmarket-ghcr
      - key: IMAGE_REGISTRY_NAMESPACE
        sync: false
      - key: GHCR_USERNAME
        sync: false
      - key: GHCR_TOKEN
        sync: false

  - type: worker
    name: start-worker
    runtime: docker
    plan: starter
    region: oregon
    rootDir: apps/api
    buildFilter:
      paths:
        - apps/api/**
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: arq app.worker.WorkerSettings
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 300
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_BASE_URL
        value: https://web-six-dusky-20.vercel.app
      - key: PUBLIC_API_BASE_URL
        value: https://start-3lbd.onrender.com
      - key: CORS_ORIGINS
        value: '["https://web-six-dusky-20.vercel.app"]'
      - key: CORS_ORIGIN_REGEX
        value: ""
      - key: ALLOW_VERCEL_PREVIEW_ORIGINS
        value: "false"
      - key: MAX_SOURCE_ZIP_ENTRIES
        value: "500"
      - key: MAX_SOURCE_ZIP_UNCOMPRESSED_BYTES
        value: "104857600"
      - key: DATABASE_URL
        fromDatabase:
          name: hackmarket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hackmarket-redis
          type: keyvalue
          property: connectionString
      - key: WORKER_QUEUE_NAME
        value: hackmarket:jobs
      - key: WORKER_JOB_MAX_ATTEMPTS
        value: "3"
      - key: WORKER_JOB_TIMEOUT_SECONDS
        value: "900"
      - key: WORKER_JOB_KEEP_RESULT_SECONDS
        value: "86400"
      - key: WORKER_CONCURRENCY
        value: "4"
      - key: WORKER_HEALTH_CHECK_INTERVAL_SECONDS
        value: "60"
      - key: WORKER_HEALTH_CHECK_KEY
        value: hackmarket:jobs:health
      - key: RUN_BILLING_SCHEDULER_IN_API
        value: "false"
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_TIMEOUT_SECONDS
        value: "5"
      - key: ALERT_DEDUPE_TTL_SECONDS
        value: "900"
      - key: ALERT_QUEUE_DEPTH_THRESHOLD
        value: "100"
      - key: ALERT_PROCESSING_JOB_STALE_AFTER_SECONDS
        value: "1800"
      - key: ALERT_FAILED_PROCESSING_JOBS_THRESHOLD
        value: "3"
      - key: ALERT_FAILED_PROCESSING_JOBS_WINDOW_SECONDS
        value: "900"
      - key: CONVERTER_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4
      - key: OPENROUTER_APP_URL
        value: https://web-six-dusky-20.vercel.app
      - key: OPENROUTER_APP_NAME
        value: Hackmarket
      - key: ALLOW_REPO_ANALYSIS_FALLBACK
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: RENDER_TOOL_REGION
        value: oregon
      - key: RENDER_TOOL_PLAN
        value: starter
      - key: RENDER_TOOL_AUTO_DEPLOY
        value: "false"
      - key: RENDER_TOOL_HEALTHCHECK_PATH
        value: /health
      - key: RENDER_TOOL_DEPLOY_TIMEOUT_SECONDS
        value: "900"
      - key: GATEWAY_RATE_LIMIT_VIOLATION_ALERT_THRESHOLD
        value: "3"
      - key: GATEWAY_RATE_LIMIT_VIOLATION_WINDOW_SECONDS
        value: "3600"
      - key: MAX_ACTIVE_API_KEYS_PER_USER
        value: "10"
      - key: RENDER_REGISTRY_CREDENTIAL_ID
        sync: false
      - key: RENDER_REGISTRY_CREDENTIAL_NAME
        value: hackmarket-ghcr
      - key: IMAGE_REGISTRY_NAMESPACE
        sync: false
      - key: GHCR_USERNAME
        sync: false
      - key: GHCR_TOKEN
        sync: false

  - type: keyvalue
    name: hackmarket-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: home-accessibility-checker
    runtime: node
    plan: starter
    region: oregon
    rootDir: apps/seller-tools/home-accessibility-checker
    buildFilter:
      paths:
        - apps/seller-tools/home-accessibility-checker/**
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o
      - key: NODE_ENV
        value: production
      - key: PUBLIC_APP_URL
        value: https://web-six-dusky-20.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://web-six-dusky-20.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: OPENROUTER_TIMEOUT_MS
        value: "20000"
      - key: ANALYSIS_TIMEOUT_MS
        value: "45000"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: MAX_FILES
        value: "5"
      - key: MAX_INLINE_IMAGES
        value: "5"
      - key: LISTING_FETCH_TIMEOUT_MS
        value: "10000"
      - key: MAX_LISTING_HTML_BYTES
        value: "2097152"
      - key: REMOTE_IMAGE_FETCH_TIMEOUT_MS
        value: "10000"
      - key: MAX_REMOTE_IMAGE_BYTES
        value: "12582912"

databases:
  - name: hackmarket-db
    databaseName: hackmarket
    user: hackmarket
    plan: basic-256mb
    region: oregon
    ipAllowList: []
