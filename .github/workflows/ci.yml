name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/hackmarket-api
  WEB_IMAGE_NAME: ${{ github.repository_owner }}/hackmarket-web

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan tracked files for committed secrets
        run: python scripts/security_scan.py

  render-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render blueprint validator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate render monorepo settings
        run: python scripts/render_blueprint_report.py --check

      - name: Validate production readiness assumptions
        run: python scripts/production_readiness_check.py

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackmarket_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hackmarket_test
          REDIS_URL: redis://localhost:6379/15
          ENVIRONMENT: test
          STRIPE_SECRET_KEY: sk_test_ci
          CLERK_JWKS_URL: https://example.com/.well-known/jwks.json
        run: pytest -v --tb=short --cov=app --cov-report=term-missing

      - name: Validate Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hackmarket_test
          REDIS_URL: redis://localhost:6379/15
          ENVIRONMENT: test
          STRIPE_SECRET_KEY: sk_test_ci
          CLERK_JWKS_URL: https://example.com/.well-known/jwks.json
        run: python ../../scripts/check_alembic_migrations.py --upgrade

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Run frontend environment validation tests
        run: npm run test:env

      - name: Run frontend security header tests
        run: npm run test:security

      - name: Run frontend type check
        run: npm run type-check

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hackmarket.io/v1
          NEXT_PUBLIC_APP_URL: https://hackmarket.io
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5kZXYk
          CLERK_SECRET_KEY: sk_test_ci
        run: npm run build

  seller-tool:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/seller-tools/home-accessibility-checker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: "npm"
          cache-dependency-path: apps/seller-tools/home-accessibility-checker/package-lock.json

      - name: Install seller tool dependencies
        run: npm ci

      - name: Audit seller tool dependencies
        run: npm audit --audit-level=high

      - name: Verify seller tool quality gates
        run: npm run verify

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - security
      - render-blueprint
      - backend
      - frontend
      - seller-tool
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile.prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
